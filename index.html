<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time AI Agent</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="status-indicator">
            <div class="status-dot disconnected" id="statusDot"></div>
            <div class="status-text">
                <div class="status-label" id="statusLabel">Connecting to:</div>
                <div class="status-url" id="statusUrl">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        // Get WebSocket URL from query parameter
        const params = new URLSearchParams(window.location.search);
        let RELAY_SERVER_URL = params.get("wss");

        // Default to localhost when running locally.
        // On GitHub Pages, use the active ngrok tunnel.
        if (!RELAY_SERVER_URL) {
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                RELAY_SERVER_URL = `ws://localhost:3000`;
            } else {
                RELAY_SERVER_URL = `wss://helpless-epilepsy-routine.ngrok-free.dev`;
            }
        }

        const statusDot = document.getElementById('statusDot');
        const statusLabel = document.getElementById('statusLabel');
        const statusUrl = document.getElementById('statusUrl');

        statusUrl.textContent = RELAY_SERVER_URL;

        class AudioProcessor {
            constructor() {
                this.audioContext = null;
                this.mediaStream = null;
                this.workletNode = null;
                this.analyser = null;
            }

            async initialize() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                    if (this.audioContext.state === 'suspended') {
                        await this.audioContext.resume();
                    }

                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: false,
                        }
                    });

                    const source = this.audioContext.createMediaStreamSource(this.mediaStream);
                    
                    // Create script processor for audio data
                    this.workletNode = this.audioContext.createScriptProcessor(4096, 1, 1);
                    
                    source.connect(this.workletNode);
                    this.workletNode.connect(this.audioContext.destination);

                    return true;
                } catch (error) {
                    console.error('Audio initialization failed:', error);
                    throw error;
                }
            }

            onAudioData(callback) {
                if (this.workletNode) {
                    this.workletNode.onaudioprocess = (event) => {
                        const float32Data = event.inputBuffer.getChannelData(0);
                        callback(float32Data);
                    };
                }
            }

            playAudio(audioData) {
                if (!this.audioContext) return;
                
                const buffer = this.audioContext.createBuffer(1, audioData.length, 24000);
                const channelData = buffer.getChannelData(0);
                channelData.set(audioData);
                
                const source = this.audioContext.createBufferSource();
                source.buffer = buffer;
                source.connect(this.audioContext.destination);
                source.start();
            }

            stop() {
                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                }
                if (this.workletNode) {
                    this.workletNode.disconnect();
                }
            }
        }

        class RealtimeAgent {
            constructor(serverUrl) {
                this.serverUrl = serverUrl;
                this.ws = null;
                this.audioProcessor = new AudioProcessor();
                this.connected = false;
                this.audioBuffer = [];
            }

            async connect() {
                return new Promise((resolve, reject) => {
                    try {
                        this.ws = new WebSocket(this.serverUrl, 'realtime');

                        this.ws.onopen = async () => {
                            console.log('✓ Connected to server');
                            statusDot.className = 'status-dot connected';
                            statusLabel.textContent = 'Connected to:';
                            
                            try {
                                await this.audioProcessor.initialize();
                                this.connected = true;

                                // Start sending audio data
                                this.audioProcessor.onAudioData((float32Data) => {
                                    const int16Data = this.float32ToInt16(float32Data);
                                    const base64Audio = this.arrayBufferToBase64(int16Data);
                                    
                                    this.ws.send(JSON.stringify({
                                        type: 'input_audio_buffer.append',
                                        audio: base64Audio
                                    }));
                                });

                                // Send initial message
                                this.ws.send(JSON.stringify({
                                    type: 'input_text',
                                    text: 'Hello! Please introduce yourself and say how you can help.'
                                }));

                                resolve(true);
                            } catch (error) {
                                console.error('Audio setup failed:', error);
                                reject(error);
                            }
                        };

                        this.ws.onmessage = (event) => {
                            try {
                                const message = JSON.parse(event.data);
                                
                                if (message.type === 'response.audio.delta' && message.delta) {
                                    const audioData = this.base64ToArrayBuffer(message.delta);
                                    const float32Data = this.int16ToFloat32(audioData);
                                    this.audioProcessor.playAudio(float32Data);
                                }
                            } catch (error) {
                                console.error('Error processing message:', error);
                            }
                        };

                        this.ws.onerror = (error) => {
                            console.error('WebSocket error:', error);
                            statusDot.className = 'status-dot disconnected';
                            statusLabel.textContent = 'Error:';
                            statusUrl.textContent = error.message || 'Connection error';
                            reject(error);
                        };

                        this.ws.onclose = () => {
                            console.log('Disconnected from server');
                            statusDot.className = 'status-dot disconnected';
                            statusLabel.textContent = 'Disconnected from:';
                            this.connected = false;
                            this.audioProcessor.stop();
                        };
                    } catch (error) {
                        reject(error);
                    }
                });
            }

            float32ToInt16(float32Data) {
                const int16Data = new Int16Array(float32Data.length);
                for (let i = 0; i < float32Data.length; i++) {
                    int16Data[i] = Math.max(-1, Math.min(1, float32Data[i])) * 0x7fff;
                }
                return int16Data;
            }

            int16ToFloat32(int16Data) {
                const float32Data = new Float32Array(int16Data.length);
                for (let i = 0; i < int16Data.length; i++) {
                    float32Data[i] = int16Data[i] * (1 / 0x7fff);
                }
                return float32Data;
            }

            arrayBufferToBase64(buffer) {
                let binary = '';
                const bytes = new Uint8Array(buffer);
                for (let i = 0; i < bytes.byteLength; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                return btoa(binary);
            }

            base64ToArrayBuffer(base64) {
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                return bytes.buffer;
            }

            disconnect() {
                if (this.ws) {
                    this.ws.close();
                }
                this.audioProcessor.stop();
            }
        }

        // Initialize agent
        const agent = new RealtimeAgent(RELAY_SERVER_URL);

        agent.connect().catch(error => {
            console.error('Failed to connect:', error);
            statusDot.className = 'status-dot disconnected';
            statusLabel.textContent = 'Error:';
            statusUrl.textContent = error.message || 'Failed to connect';
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            agent.disconnect();
        });
    </script>
</body>
</html>
